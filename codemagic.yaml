workflows:

  # ─────────────────────────────────────────────────────────────────────────────
  # iOS Workflow — builds a signed .ipa for install on a real iPhone
  # Requires these Environment Variables set in the Codemagic dashboard:
  #   APP_STORE_CONNECT_ISSUER_ID       → from App Store Connect > Keys
  #   APP_STORE_CONNECT_KEY_IDENTIFIER  → from App Store Connect > Keys
  #   APP_STORE_CONNECT_PRIVATE_KEY     → contents of your AuthKey_XXXX.p8 file
  #   CERTIFICATE_PRIVATE_KEY           → your Apple distribution/dev cert private key
  # ─────────────────────────────────────────────────────────────────────────────
  ios-release:
    name: iOS Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.41.7
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: ad_hoc       # change to app_store for TestFlight/App Store
        bundle_identifier: com.yeab.hercycle

    scripts:
      - name: Set up Flutter
        script: flutter --version

      - name: Install Flutter dependencies
        script: flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios && pod install --repo-update

      - name: Build iOS (signed)
        script: |
          flutter build ios --release \
            --dart-define=FLUTTER_BUILD_NAME=$PROJECT_BUILD_NUMBER

      - name: Package .ipa
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      email:
        recipients:
          - aa.aberham@gmail.com
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────────────────────────────────────────
  # iOS Simulator — builds a simulator .app for Appetize.io testing
  # No Apple credentials required — free to run on Codemagic
  # Upload the Runner.app.zip artifact to appetize.io/upload
  # ─────────────────────────────────────────────────────────────────────────────
  ios-simulator:
    name: iOS Simulator Build (for Appetize.io)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.41.7
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install Flutter dependencies
        script: flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios && pod install --repo-update

      - name: Build iOS simulator
        script: |
          flutter build ios --simulator --debug

      - name: Zip simulator app
        script: |
          cd build/ios/iphonesimulator
          zip -r Runner.app.zip Runner.app

    artifacts:
      - build/ios/iphonesimulator/Runner.app.zip

    publishing:
      email:
        recipients:
          - aa.aberham@gmail.com
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────────────────────────────────────────
  # iOS IPA (unsigned) — for sideloading via Sideloadly / AltStore on real device
  # No Apple developer account needed — sign locally with Sideloadly using
  # your free Apple ID. Note: free Apple ID apps expire every 7 days.
  # ─────────────────────────────────────────────────────────────────────────────
  ios-ipa-sideload:
    name: iOS IPA for Sideloading
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.41.7
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install Flutter dependencies
        script: flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios && pod install --repo-update

      - name: Build iOS (no codesign)
        script: |
          flutter build ios --release --no-codesign

      - name: Package as IPA
        script: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/Runner.app
          cd build/ios/ipa
          zip -r HerCycle.ipa Payload

    artifacts:
      - build/ios/ipa/HerCycle.ipa

    publishing:
      email:
        recipients:
          - aa.aberham@gmail.com
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────────────────────────────────────────
  # Android Workflow — builds a release APK
  # For a signed APK, set these Environment Variables in Codemagic dashboard:
  #   CM_KEYSTORE         → base64-encoded .jks or .keystore file
  #   CM_KEYSTORE_PASSWORD
  #   CM_KEY_ALIAS
  #   CM_KEY_PASSWORD
  # ─────────────────────────────────────────────────────────────────────────────
  android-release:
    name: Android Release Build
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      flutter: 3.41.7
      java: 17
      android_signing:
        - your_keystore_reference   # set up in Codemagic > Code signing > Android

    scripts:
      - name: Install dependencies
        script: flutter pub get

      - name: Build Android APK
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/app/outputs/bundle/release/app-release.aab

    publishing:
      email:
        recipients:
          - aa.aberham@gmail.com
        notify:
          success: true
          failure: true
