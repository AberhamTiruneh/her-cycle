name: her_cycle
description: A menstrual period tracker app designed to help women track their cycles and health.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.0

  # Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_messaging: ^16.2.0

  # Authentication
  google_sign_in: ^6.2.1

  # State Management
  provider: ^6.1.1

  # Storage
  shared_preferences: ^2.2.2

  # Design & UI
  google_fonts: ^8.0.2
  table_calendar: ^3.0.9
  fl_chart: ^1.2.0
  smooth_page_indicator: ^2.0.1
  shimmer: ^3.0.0
  lottie: ^3.3.3

  # Notifications
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.4

  # SMS
  twilio_flutter: ^0.9.0

  # File & Image
  pdf: ^3.10.7
  path_provider: ^2.1.2
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

